<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3">
<title>Monitoreo de Bateria IoT</title>
<style>
#pestana{
font-family:'Courier New', monospace;
background:#1a1a1a;
color:#00ff41;
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}
#titulito{
color:#ffff00;
text-align:center;
margin-bottom:15px;
font-size:22px;
}
#panel-datos{
background:#000000;
border:3px solid #00aa00;
border-radius:8px;
padding:15px;
width:520px;
box-shadow:0 0 15px rgba(0,255,0,0.3);
margin-bottom:20px;
}
#tabla-monitor{
width:100%;
border-collapse:collapse;
}
#tabla-monitor td{
padding:6px;
border-bottom:1px dashed #005500;
font-size:15px;
}
#estado-actual{
font-size:20px;
text-align:center;
margin-top:10px;
padding:8px;
border:2px solid #00ff41;
border-radius:6px;
}
#monitor{
background:#000000;
padding:15px;
width:520px;
height:300px;
overflow-y:scroll;
border:3px solid #00aa00;
white-space:pre-wrap;
font-size:14px;
line-height:1.5;
box-shadow:0 0 15px rgba(0,255,0,0.3);
}
#form-control{
margin-top:20px;
text-align:center;
}
#form-control select{
background:#000000;
color:#00ff41;
border:2px solid #00aa00;
padding:5px;
font-family:'Courier New', monospace;
}
#form-control input{
background:#00aa00;
color:#000000;
border:none;
padding:6px 15px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}
</style>
</head>
<body id="pestana">

<h1 id="titulito">Monitoreo De Bateria IOT</h1>

<div id="panel-datos">
<table id="tabla-monitor">
<tr><td>Voltaje:</td><td>{{ datos.voltaje }} V</td></tr>
<tr><td>Corriente:</td><td>{{ datos.corriente }} mA</td></tr>
<tr><td>Temperatura:</td><td>{{ datos.temperatura }} °C</td></tr>
<tr><td>Humedad:</td><td>{{ datos.humedad }} %</td></tr>
<tr><td>Salud de batería:</td><td>{{ datos.salud }} %</td></tr>
</table>
<div id="estado-actual">ESTADO: {{ datos.estado }}</div>
</div>

<div id="monitor">
{% for linea in log %}
{{ linea }}
{% endfor %}
</div>

<div id="form-control">
<form action="/control" method="POST">
<select name="color">
<option value="VERDE">Forzar LED Verde</option>
<option value="AMARILLO">Forzar LED Amarillo</option>
<option value="ROJO">Forzar LED Rojo</option>
</select>
<input type="submit" value="Activar">
</form>
</div>

</body>
</html>
